<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="180" viewBox="0 0 1200 180" role="img" aria-labelledby="title desc">
  <title id="title">Codex CLI provenance note</title>
  <desc id="desc">Project code authored through Codex CLI, from GPT-5 to GPT-5.3-Codex maturity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="50%" stop-color="#0a0f26"/>
      <stop offset="100%" stop-color="#060913"/>
    </linearGradient>
    <linearGradient id="neonLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <filter id="glowCyan" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#22d3ee" flood-opacity="0.95"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#22d3ee" flood-opacity="0.4"/>
    </filter>
    <filter id="glowPink" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#f472b6" flood-opacity="0.95"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f472b6" flood-opacity="0.4"/>
    </filter>
    <pattern id="scanlines" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="none"/>
      <rect y="0" width="6" height="1" fill="#93c5fd" opacity="0.06"/>
    </pattern>
  </defs>

  <rect x="8" y="8" width="1184" height="164" rx="18" fill="url(#bg)" stroke="#1f2a44" stroke-width="1.5"/>
  <rect x="8" y="8" width="1184" height="164" rx="18" fill="url(#scanlines)"/>
  <rect x="8" y="8" width="1184" height="164" rx="18" fill="none" stroke="url(#neonLine)" stroke-width="1.8" opacity="0.8"/>
  <rect x="24" y="24" width="6" height="132" rx="3" fill="url(#neonLine)" filter="url(#glowCyan)"/>

  <text x="52" y="64" fill="#e2e8f0" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="30" font-weight="700" filter="url(#glowCyan)">
    Built 100% through Codex CLI
  </text>
  <text x="52" y="102" fill="#cbd5e1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="500">
    Started on GPT-5 and reached maturity on GPT-5.3-Codex
  </text>
  <text x="52" y="136" fill="#93c5fd" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="22" font-weight="700" filter="url(#glowPink)">
    Not a single line written by hand.
  </text>

  <g transform="translate(1088 18)">
    <rect x="0" y="0" width="96" height="28" rx="7" fill="#0b1331" stroke="#27324d" stroke-width="1"/>
    <line x1="16" y1="14" x2="26" y2="14" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" filter="url(#glowCyan)"/>
    <rect x="43" y="9" width="10" height="10" fill="none" stroke="#8b5cf6" stroke-width="1.6" filter="url(#glowCyan)"/>
    <line x1="70" y1="9" x2="80" y2="19" stroke="#f472b6" stroke-width="1.8" stroke-linecap="round" filter="url(#glowPink)"/>
    <line x1="80" y1="9" x2="70" y2="19" stroke="#f472b6" stroke-width="1.8" stroke-linecap="round" filter="url(#glowPink)"/>
  </g>
</svg>
